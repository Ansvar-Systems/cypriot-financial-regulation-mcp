# sources.yml -- Data provenance metadata
# Reference: docs/mcp-infrastructure-blueprint.md
# Last verified: 2026-05-17 (MT/CY fleet hygiene Round 2)

schema_version: "1.0"
mcp_name: "Cypriot Financial Regulation MCP"
category: "domain_intelligence"
jurisdiction: "CY"

sources:
  - name: "Cyprus Securities and Exchange Commission (CySEC)"
    authority: "Cyprus Securities and Exchange Commission"
    official_url: "https://www.cysec.gov.cy"
    retrieval_method: "HTML_SCRAPE"
    format: "HTML"
    authentication: "none"
    update_frequency: "monthly"
    license:
      code: "Cyprus-PSI"
      type: "Statutory — Cyprus public-sector information re-use regime"
      url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32019L1024"
      evidence_url: "https://www.cysec.gov.cy/en-GB/terms/"
      summary: >
        CySEC is a statutory authority of the Republic of Cyprus established
        under the Securities and Exchange Commission Law 73(I)/2009. As a
        public-sector body it falls within scope of Cyprus Law 143(I)/2021
        (transposing EU Directive 2019/1024 on Open Data and re-use of
        public sector information). Article 8 of the directive mandates
        commercial re-use. CySEC's /en-GB/terms/ page contains e-commerce
        terms for the website's JCC payment-handling service, not a content
        re-use grant; the earlier /en-GB/disclaimer/ page returns HTTP 410.
        Licence basis is statutory PSI, not the website terms page.
      attribution_block: "Source: Cyprus Securities and Exchange Commission (CySEC). Reproduced under Cyprus public-sector information re-use regime (Law 143(I)/2021, transposing EU Directive 2019/1024)."
    source_url_pattern: "^https?://(www\\.)?cysec\\.gov\\.cy/(en-GB|el-GR)/(public-info|legal|sanctions)/.*"
    source_url_pattern_granularity: "item-level"
    coverage:
      scope: >
        CySEC board decisions, court decisions, administrative sanctions,
        circulars, and public registers for entities supervised under the
        Investment Services and Activities Law 87(I)/2017 and related
        Cyprus financial-services statutes.
    languages:
      - "el"
      - "en"
    known_operational_issues:
      - "Coverage RED: ~415 sanctions visible upstream are not currently ingested. Reingestion targeting current URL paths (/public-info/, /legal/, /sanctions/) is a separate workstream and does not block this licence-axis manifest fix."
